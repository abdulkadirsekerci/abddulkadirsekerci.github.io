<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GÜNLÜK NÖBET ÇİZELGESİ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #tarih { font-size: 3rem; color: #00d4ff; margin-bottom: 20px; }
        table { width: 90%; border-collapse: collapse; background: #111; border: 4px solid #333; border-radius: 20px; overflow: hidden; }
        th, td { padding: 25px; font-size: 2.5rem; border: 1px solid #222; text-align: left; }
        th { background: #222; color: #00d4ff; text-transform: uppercase; }
        .vurgu { font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div id="tarih">Yükleniyor...</div>
    <table id="nobetTablosu">
        </table>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxF1VpopXePOy1x9E21q6HkY2NHPCNqmF7smgt5u61q9EXhD2tv_du4cpvvDLqp1pKV4qkVHWZP-i/pub?output=csv';

        async function nobetiGetir() {
            try {
                const simdi = new Date();
                const yil = simdi.getFullYear();
                const ay = String(simdi.getMonth() + 1).padStart(2, '0');
                const gun = String(simdi.getDate()).padStart(2, '0');
                
                // CSV'deki format: 2026-04-15
                const bugunCSV = `${yil}-${ay}-${gun}`;
                // Ekranda görünecek format: 15.04.2026
                document.getElementById('tarih').innerText = `${gun}.${ay}.${yil} NÖBETÇİ LİSTESİ`;

                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const data = await response.text();
                const satirlar = data.split(/\r?\n/);
                
                let tabloHTML = "";
                let bulundu = false;

                // İlk satır başlıklardır (Tarih, Gün, Bahçe, Zemin...)
                const basliklar = satirlar[0].split(',');

                for (let i = 1; i < satirlar.length; i++) {
                    const sutunlar = satirlar[i].split(',');
                    if (sutunlar[0].trim() === bugunCSV) {
                        // Başlıkları ve isimleri eşleştirerek tablo oluştur
                        for (let j = 2; j < basliklar.length; j++) {
                            tabloHTML += `<tr>
                                <th>${basliklar[j]}</th>
                                <td class="vurgu">${sutunlar[j] || '-'}</td>
                            </tr>`;
                        }
                        bulundu = true;
                        break;
                    }
                }

                if (!bulundu) {
                    document.getElementById('nobetTablosu').innerHTML = "<tr><td style='text-align:center'>BUGÜN İÇİN NÖBET KAYDI BULUNAMADI</td></tr>";
                } else {
                    document.getElementById('nobetTablosu').innerHTML = tabloHTML;
                }

            } catch (hata) {
                document.getElementById('nobetTablosu').innerHTML = "<tr><td>BAĞLANTI HATASI!</td></tr>";
            }
        }

        nobetiGetir();
        setInterval(nobetiGetir, 3600000); // 1 saatte bir yenile
    </script>
</body>
</html>

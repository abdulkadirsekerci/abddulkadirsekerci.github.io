<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÖBETÇİ LİSTESİ</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #baslik {
            font-size: 3.5rem;
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: bold;
        }
        table {
            width: 90%;
            border-collapse: collapse;
            border: 6px solid #fff;
            background: #000;
        }
        th, td {
            padding: 30px;
            font-size: 3.5rem;
            border: 2px solid #444;
            text-align: left;
        }
        th { background-color: #222; color: #00d4ff; width: 35%; }
        td { font-weight: bold; color: #fff; }
        .hata { font-size: 2.5rem; color: #ff4444; padding: 50px; text-align: center; }
    </style>
</head>
<body>

    <div id="baslik">YÜKLENİYOR...</div>
    <table id="tablo"></table>

    <script>
        // Senin CSV linkin
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfQalRVQ1BeN02-dQkHNTL-RtoImYh1qO_eaM1mtFdP3TSjDc_wOzlxsfQL7as4uYIhvA9kdmustkK/pub?output=csv';

        async function veriyiGetir() {
            try {
                // Bugünün tarihini gece yarısına ayarla (Saat farkı olmaması için)
                const simdi = new Date();
                const bugunZaman = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate()).getTime();
                
                // Başlıkta gösterim için
                document.getElementById('baslik').innerText = simdi.toLocaleDateString('tr-TR') + " NÖBETÇİLERİ";

                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const text = await response.text();
                const satirlar = text.split(/\r?\n/);
                
                // Başlıkları al ve temizle
                const basliklar = satirlar[0].split(',').map(s => s.trim().replace(/"/g, ''));
                
                let html = "";
                let bulundu = false;

                for (let i = 1; i < satirlar.length; i++) {
                    const sutunlar = satirlar[i].split(',').map(s => s.trim().replace(/"/g, ''));
                    const satirTarihHam = sutunlar[0]; // Örn: 2026-04-15

                    if (satirTarihHam) {
                        // Excel'den gelen tarihi parçalara ayır (Yıl, Ay, Gün)
                        const tParca = satirTarihHam.split(/[-.]/); // Hem tireyi hem noktayı destekler
                        let tNesnesi;

                        if (tParca[0].length === 4) { // YYYY-MM-DD formatı ise
                            tNesnesi = new Date(tParca[0], tParca[1] - 1, tParca[2]).getTime();
                        } else { // DD.MM.YYYY formatı ise
                            tNesnesi = new Date(tParca[2], tParca[1] - 1, tParca[0]).getTime();
                        }

                        // Bugünün zamanı ile Excel'deki zamanı karşılaştır
                        if (tNesnesi === bugunZaman) {
                            for (let j = 2; j < basliklar.length; j++) {
                                if (basliklar[j]) {
                                    html += `<tr><th>${basliklar[j]}</th><td>${sutunlar[j] || '-'}</td></tr>`;
                                }
                            }
                            bulundu = true;
                            break;
                        }
                    }
                }

                if (!bulundu) {
                    document.getElementById('tablo').innerHTML = `<tr><td class="hata">BUGÜN İÇİN VERİ BULUNAMADI<br><span style="font-size:1.5rem; color:gray">Aranan Tarih Formatı: ${simdi.toISOString().split('T')[0]}</span></td></tr>`;
                } else {
                    document.getElementById('tablo').innerHTML = html;
                }

            } catch (e) {
                document.getElementById('tablo').innerHTML = `<tr><td class="hata">BAĞLANTI HATASI</td></tr>`;
            }
        }

        veriyiGetir();
        setInterval(veriyiGetir, 600000);
    </script>
</body>
</html>

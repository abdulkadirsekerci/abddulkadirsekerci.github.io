<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÖBETÇİ LİSTESİ</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #tarih-baslik { font-size: 3rem; color: #00d4ff; margin-bottom: 20px; }
        table { width: 90%; border-collapse: collapse; background: #111; border: 5px solid #333; border-radius: 25px; overflow: hidden; }
        th, td { padding: 25px; font-size: 3rem; border: 1px solid #222; text-align: left; }
        th { background: #222; color: #00d4ff; width: 40%; }
        td { font-weight: bold; }
        .hata-mesaji { font-size: 3rem; color: #ff4444; padding: 40px; }
    </style>
</head>
<body>

    <div id="tarih-baslik">YÜKLENİYOR...</div>
    <table id="tablo"></table>

    <script>
        // Senin son attığın link
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfQalRVQ1BeN02-dQkHNTL-RtoImYh1qO_eaM1mtFdP3TSjDc_wOzlxsfQL7as4uYIhvA9kdmustkK/pub?output=csv';

        function tarihFormatla(tarihStr) {
            // "15.04.2026" veya "2026-04-15" formatlarını temizler
            return tarihStr.replace(/["']/g, "").trim();
        }

        async function veriyiGetir() {
            try {
                const simdi = new Date();
                const gun = String(simdi.getDate()).padStart(2, '0');
                const ay = String(simdi.getMonth() + 1).padStart(2, '0');
                const yil = simdi.getFullYear();
                
                // Karşılaştırma için iki ihtimali de oluşturuyoruz
                const bugunNoktali = `${gun}.${ay}.${yil}`; // 15.04.2026
                const bugunTireli = `${yil}-${ay}-${gun}`; // 2026-04-15

                document.getElementById('tarih-baslik').innerText = bugunNoktali + " NÖBETÇİLERİ";

                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const data = await response.text();
                const satirlar = data.split(/\r?\n/);
                const basliklar = satirlar[0].split(',');

                let bulundu = false;
                let html = "";

                for (let i = 1; i < satirlar.length; i++) {
                    const sutunlar = satirlar[i].split(',');
                    const satirTarihi = tarihFormatla(sutunlar[0]);

                    // EĞER TARİH NOKTALI VEYA TİRELİ OLARAK EŞLEŞİRSE
                    if (satirTarihi === bugunNoktali || satirTarihi === bugunTireli) {
                        for (let j = 2; j < basliklar.length; j++) {
                            if (basliklar[j].trim()) {
                                html += `<tr>
                                    <th>${basliklar[j].replace(/"/g, '')}</th>
                                    <td>${(sutunlar[j] || '-').replace(/"/g, '')}</td>
                                </tr>`;
                            }
                        }
                        bulundu = true;
                        break;
                    }
                }

                if (!bulundu) {
                    document.getElementById('tablo').innerHTML = `<tr><td class="hata-mesaji">BUGÜN (${bugunNoktali}) İÇİN KAYIT YOK<br><small style="font-size:1rem; color:gray;">Excel'deki tarih formatını kontrol edin.</small></td></tr>`;
                } else {
                    document.getElementById('tablo').innerHTML = html;
                }

            } catch (h) {
                document.getElementById('tablo').innerHTML = `<tr><td class="hata-mesaji">BAĞLANTI HATASI</td></tr>`;
            }
        }

        veriyiGetir();
        setInterval(veriyiGetir, 600000); // 10 dakikada bir kontrol
    </script>
</body>
</html>
